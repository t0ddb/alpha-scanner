# =============================================================
# INDICATOR CONFIGURATION
# =============================================================
# Weights derived from backtesting: 94 tickers, 2 years, 4048 obs.
# Ranked by 63-day forward return predictive edge.
# =============================================================
indicators:

  # --- PRIMARY indicators (high weight) ---

  relative_strength:
    period: 63            # ~3 months
    benchmark: SPY
    percentile: 75        # top quartile = flagged
    weight: 3.0           # +13.31% edge, 77.4% win rate

  ichimoku_cloud:
    tenkan: 9
    kijun: 26
    senkou_b: 52
    weight: 2.5           # +10.89% edge, 76.9% win rate

  higher_lows:
    num_periods: 4        # consecutive higher-low periods required
    period_length: 5      # trading days per period (~1 week)
    weight: 2.0           # +7.73% edge, 75.9% win rate

  moving_averages:
    short_period: 50
    long_period: 200
    golden_cross_lookback: 20
    weight: 2.0           # +7.54% edge, 73.8% win rate

  roc:
    period: 21            # 21-day rate of change
    threshold: 5.0        # flag if ROC > 5%
    weight: 1.5           # +6.84% edge, 72.6% win rate

  # --- CONFIRMATION indicators (lower weight) ---

  cmf:
    period: 20
    threshold: 0.05       # flag if CMF > 0.05
    weight: 1.0           # +6.57% edge, 73.2% win rate

  near_52w_high:
    threshold_pct: 0.02   # flag if within 2% of 52-week high
    weight: 1.0           # +4.52% edge, 84.5% win rate

  atr_expansion:
    period: 14
    lookback: 50
    threshold_percentile: 80  # flag if ATR in top 20%
    weight: 0.5           # +4.58% edge, 69.5% win rate

# =============================================================
# SCORING — Regime-Independent (3yr conditional edge analysis)
# =============================================================
# Gradient:  RS 0-3.0, Higher Lows 0-1.0
# Binary:    Ichimoku 2.0, CMF 1.5, ROC 1.5, Dual-TF RS 0.5, ATR 0.5
# Max: 10.0
# Dropped: MA Alignment (-9.3% edge), Near 52w High (-3.3% edge)
# =============================================================
scoring:
  max_score: 10.0
  email_threshold: 6
  indicators:
    - relative_strength
    - higher_lows
    - ichimoku_cloud
    - cmf
    - roc
    - dual_tf_rs
    - atr_expansion

# =============================================================
# TRADE EXECUTION (Alpaca paper trading)
# =============================================================
# Thresholds from 3yr backtest: 8.5 entry with 3-day persistence
# beats the prior 9.5 baseline on return, DD, and win rate while
# filtering out false-start tickers (IREN, AAOI, BTBT, RCAT, RGTI).
# Env vars override these: ENTRY_THRESHOLD, EXIT_THRESHOLD,
# PERSISTENCE_DAYS, STOP_LOSS_PCT.
# =============================================================
trade_execution:
  entry_threshold: 8.5       # Score ≥ this to open new position
  exit_threshold: 5.0        # Score < this closes the position
  persistence_days: 3        # Require N prior trading days at/above entry_threshold
  stop_loss_pct: 0.15        # 15% stop loss from entry
  max_position_pct: 0.20     # Max 20% of equity per position
  min_position_size: 500     # Minimum $ size for a new position

# =============================================================
# SUBSECTOR BREAKOUT DETECTION
# =============================================================
breakout_detection:
  breadth_threshold: 6          # score threshold for a ticker to count as "hot"
  breadth_trigger: 0.5          # fraction of tickers that must be hot (50%)
  z_score_trigger: 1.0          # std devs above 60-day mean for emerging
  lookback_days: 60             # rolling window for mean/std
  confirm_days: 3               # consecutive hot readings for confirmation
  fade_cool_days: 5             # consecutive cool readings to return to quiet
  history_retention_days: 180   # how long to keep daily records in SQLite
