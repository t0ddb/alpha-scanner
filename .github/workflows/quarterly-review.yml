name: Quarterly System Review

on:
  schedule:
    # 1st of Jan/Apr/Jul/Oct at 14:00 UTC (06:00 PT)
    - cron: '0 14 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      months:
        description: 'Lookback window in months'
        required: false
        default: '12'

jobs:
  quarterly-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quarterly review
        run: python quarterly_review.py --months ${{ github.event.inputs.months || '12' }}

      - name: Commit review results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quarterly_reviews/
          git diff --cached --quiet || git commit -m "Quarterly review $(date +%Y-Q$(( ($(date +%-m)-1)/3+1 )))"
          git pull --rebase || true
          git push
