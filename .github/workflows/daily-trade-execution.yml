name: Daily Trade Execution

on:
  schedule:
    # 5:30 PM ET (21:30 UTC) Monday-Friday.
    # Runs after market close; orders placed for next open.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (do not place orders)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      entry_threshold:
        description: 'Override entry score threshold (blank = use ticker_config.yaml)'
        required: false
        default: ''
      persistence_days:
        description: 'Override N-day persistence filter (blank = use ticker_config.yaml)'
        required: false
        default: ''

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Opt into Node 24 now to avoid the deprecation warning on Node 20
      # actions (checkout@v4, setup-python@v5). Node 24 becomes the default
      # on 2026-06-02 per GitHub's deprecation schedule.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      # Manual overrides from workflow_dispatch inputs. Empty strings
      # are ignored by load_trade_config() so the scheduled run still
      # reads entry_threshold / persistence_days from ticker_config.yaml.
      ENTRY_THRESHOLD: ${{ inputs.entry_threshold }}
      PERSISTENCE_DAYS: ${{ inputs.persistence_days }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trade executor
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$GMAIL_ADDRESS" ] && [ -n "$GMAIL_APP_PASSWORD" ]; then
            ARGS="$ARGS --email"
          fi
          echo "Running: python trade_executor.py $ARGS"
          python trade_executor.py $ARGS

      - name: Commit and push updated trade state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage state files only if they exist.
          # breakout_tracker.db carries today's per-ticker scores, which
          # tomorrow's run reads for the N-day persistence filter.
          [ -f trade_history.json ] && git add trade_history.json || true
          [ -f wash_sale_log.json ] && git add wash_sale_log.json || true
          [ -f breakout_tracker.db ] && git add breakout_tracker.db || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Automated trade execution $(date -u +%Y-%m-%d)"
            # Rebase in case the daily-backfill workflow pushed the DB
            # around the same time. If rebase hits a conflict on the
            # binary DB, prefer our fresh write (this run scored live
            # EOD data that backfill won't yet have).
            git pull --rebase -X ours || git rebase --abort
            git push
          fi

      - name: Verify DB advanced to today
        # Catches the failure mode where the job "succeeds" but didn't
        # actually write today's ticker_scores (e.g., score_all silently
        # failing pre-hardening, commit step skipped, etc.). Runs after
        # commit so partial state is preserved; failure here triggers a
        # GitHub Actions notification email.
        run: |
          python3 -c "
          import sqlite3, sys
          from datetime import datetime
          from zoneinfo import ZoneInfo
          today = datetime.now(ZoneInfo('America/Los_Angeles')).date().isoformat()
          conn = sqlite3.connect('breakout_tracker.db')
          row = conn.execute('SELECT MAX(date) FROM ticker_scores').fetchone()
          db_max = row[0] if row else None
          conn.close()
          if db_max == today:
              print(f'[OK] ticker_scores max date = {db_max} (today)')
          else:
              print(f'[FAIL] ticker_scores max date = {db_max}, expected {today}')
              sys.exit(1)
          "
