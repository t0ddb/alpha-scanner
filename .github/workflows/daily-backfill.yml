name: Daily Database Backfill

on:
  schedule:
    # 5:30 PM ET (21:30 UTC) Monday-Friday
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        run: python backfill_subsector.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add breakout_tracker.db
          git diff --cached --quiet || git commit -m "Automated daily DB backfill $(date +%Y-%m-%d)"
          git push
