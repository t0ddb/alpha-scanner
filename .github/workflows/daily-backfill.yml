name: Daily Database Backfill

on:
  schedule:
    # 4:00 PM ET Monday-Friday (at market close) — runs 30 min before
    # the trade executor (20:30 UTC) so this backfill can complete and
    # push first, avoiding DB rebase contention. Backfill reads historical
    # bars, so landing exactly at close is fine — it doesn't need today's
    # bar to be finalized.
    #
    # GitHub Actions cron is UTC-only. The fixed UTC time below is
    # tuned for US Eastern DAYLIGHT TIME (March-November): 20:00 UTC = 4:00 PM ET.
    # When US returns to STANDARD TIME (~Nov 2026), shift to
    # cron: '0 21 * * 1-5' so it fires at 4:00 PM ET year-round.
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Opt into Node 24 now (see daily-trade-execution.yml for rationale)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        # --frequency 1 fills every trading day (vs. default sampling
        # every 5). This makes backfill a self-healing safety net for
        # the trade executor: if trade-exec ever fails to commit the DB,
        # the next backfill closes the gap within a day instead of us
        # discovering it days later.
        run: python backfill_subsector.py --frequency 1

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add breakout_tracker.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "Automated daily DB backfill $(date +%Y-%m-%d)"
            # Defensive rebase: if trade executor pushed first (shouldn't
            # happen with the 21:00/21:30 stagger, but covers manual runs),
            # prefer the backfill's broader history.
            git pull --rebase -X ours || git rebase --abort
            git push
          fi
