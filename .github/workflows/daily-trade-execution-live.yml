name: Daily Trade Execution (LIVE)

# IMPORTANT: This workflow trades real money against the LIVE Alpaca
# account. Schedule enabled 2026-04-28 — runs daily at 4:30 PM ET.
#
# To halt without removing the schedule: set repo variable
# KILL_SWITCH_LIVE=1 (Settings → Secrets and variables → Actions → Variables).
# Code-side halts are also enforced by the 10% daily-loss circuit breaker.

on:
  schedule:
    # 4:30 PM ET Mon-Fri, same time as paper. Backfill runs once at 4:00 PM
    # ET regardless of mode — DB is account-agnostic.
    #
    # GitHub Actions cron is UTC-only. The fixed UTC time below is tuned
    # for US Eastern DAYLIGHT TIME (March-November): 20:30 UTC = 4:30 PM ET.
    # When US returns to STANDARD TIME (~Nov 2026), shift to
    # cron: '30 21 * * 1-5' so it fires at 4:30 PM ET year-round.
    - cron: '30 20 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not place orders)'
        required: false
        default: 'true'    # safer default for the live workflow
        type: choice
        options:
          - 'false'
          - 'true'
      max_entries_per_day:
        description: 'Cap on new entries per day (4 recommended for first weeks)'
        required: false
        default: '4'
      entry_threshold:
        description: 'Override entry threshold (blank = ticker_config.yaml)'
        required: false
        default: ''
      persistence_days:
        description: 'Override N-day persistence (blank = ticker_config.yaml)'
        required: false
        default: ''

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ALPACA_MODE: live
      ALPACA_LIVE_API_KEY: ${{ secrets.ALPACA_LIVE_API_KEY }}
      ALPACA_LIVE_SECRET_KEY: ${{ secrets.ALPACA_LIVE_SECRET_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      # Live-account-specific overrides:
      #   $5k starting capital + 12-position cap × 8.3% = $415/slot, just
      #   below the $500 default min. Lowering MIN_POSITION_SIZE to $300
      #   keeps 12-position diversification feasible at this capital level.
      MIN_POSITION_SIZE: '300'
      # Starting-equity baseline for All-Time P&L + vs-SPY-total in the email
      # digest. UPDATE THIS when capital is added to the live account so the
      # historical performance numbers stay accurate.
      STARTING_EQUITY: '5000'
      # Phased live launch: cap entries per day. Default 4; can override
      # via workflow_dispatch input. Removing the cap: set to '0' or empty.
      MAX_ENTRIES_PER_DAY: ${{ inputs.max_entries_per_day || '4' }}
      ENTRY_THRESHOLD: ${{ inputs.entry_threshold }}
      PERSISTENCE_DAYS: ${{ inputs.persistence_days }}
      # Manual kill switch — toggle via GitHub repo variables
      # (Settings → Secrets and variables → Actions → Variables tab).
      # Set KILL_SWITCH_LIVE=1 to halt LIVE entries only (paper unaffected).
      # Exits + stop-loss management always continue.
      KILL_SWITCH: ${{ vars.KILL_SWITCH_LIVE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trade executor (LIVE)
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$GMAIL_ADDRESS" ] && [ -n "$GMAIL_APP_PASSWORD" ]; then
            ARGS="$ARGS --email"
          fi
          echo "Running: python trade_executor.py $ARGS  (ALPACA_MODE=$ALPACA_MODE)"
          python trade_executor.py $ARGS

      - name: Spillover tracker (live)
        # Hypothetical "spillover" portfolio for the LIVE stream: opens a
        # position for every live skip caused by capacity (cap full / cash
        # floor / no cash / daily cap). Same exit/stop rules as Scheme C;
        # no position cap or cash limit. Pure observability — no Alpaca
        # calls. Failures here MUST NOT block the live trade pipeline.
        continue-on-error: true
        run: |
          echo "Running spillover tracker (live)..."
          python spillover_tracker.py --mode live

      - name: Commit and push updated trade state
        # Live mode persists separate state files (trade_history_live.json,
        # wash_sale_log_live.json). DB is shared between paper and live (it
        # stores per-ticker scores, which are account-agnostic). Live workflow
        # does NOT commit the DB — that's owned by daily-backfill + paper run.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          [ -f trade_history_live.json ] && git add trade_history_live.json || true
          [ -f wash_sale_log_live.json ] && git add wash_sale_log_live.json || true
          # Spillover tracker (live) state files
          [ -f spillover_state_live.json ] && git add spillover_state_live.json || true
          [ -f spillover_trades_live.json ] && git add spillover_trades_live.json || true
          [ -f spillover_log_live.json ] && git add spillover_log_live.json || true

          # The trade_executor writes today's scores into breakout_tracker.db
          # via score_all + upsert_ticker_scores. The live workflow doesn't
          # commit the DB (paper + backfill own it), but the unstaged DB
          # mutation blocks `git pull --rebase` later. Discard it.
          git checkout -- breakout_tracker.db || true

          if git diff --cached --quiet; then
            echo "No live state changes to commit."
          else
            git commit -m "Automated LIVE trade execution $(date -u +%Y-%m-%d)"
            git pull --rebase -X ours || git rebase --abort
            git push
          fi
