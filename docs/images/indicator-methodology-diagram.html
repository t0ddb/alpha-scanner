<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Indicator Selection Methodology</title>
<style>
body { margin: 40px auto; max-width: 740px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; } }
</style></head><body>
<svg width="100%" viewBox="0 0 680 620">
<style>
  .th { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; font-weight: 500; fill: #1e293b; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; font-weight: 400; fill: #64748b; }
  .arr { stroke: #94a3b8; stroke-width: 1.5; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e2e8f0; } .ts { fill: #94a3b8; } .arr { stroke: #64748b; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle" style="font-size:16px">Indicator selection methodology</text>
<text class="ts" x="340" y="48" text-anchor="middle">From 16 candidates to 7 weighted indicators, driven by backtesting</text>

<!-- Step 1 -->
<rect x="40" y="70" width="600" height="72" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="60" y="92" dominant-baseline="central">Step 1 — started with 16 candidates</text>
<text class="ts" x="60" y="112" dominant-baseline="central">Volume spike · BB squeeze · MACD · RSI · ADX · OBV · Donchian</text>
<text class="ts" x="60" y="128" dominant-baseline="central">Ichimoku · CMF · ROC · MA alignment · 52w high · RS · Higher lows · ATR · Consolidation</text>

<!-- Connector 1→2 -->
<line x1="340" y1="142" x2="340" y2="176" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="164" dominant-baseline="central">Measured 63-day forward return edge</text>

<!-- Step 2 -->
<rect x="40" y="176" width="600" height="92" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="60" y="198" dominant-baseline="central" fill="#0C447C">Step 2 — standalone edge test</text>
<text class="ts" x="60" y="216" dominant-baseline="central" fill="#185FA5">4,048 observations: "Does this indicator predict returns?"</text>

<rect x="64" y="230" width="248" height="24" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="188" y="244" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Dropped 5 with &lt; 3% edge</text>

<rect x="332" y="230" width="248" height="24" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="ts" x="456" y="244" text-anchor="middle" dominant-baseline="central" fill="#27500A">Kept 11 with ≥ 3% edge</text>

<!-- Connector 2→3 -->
<line x1="340" y1="268" x2="340" y2="304" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="292" dominant-baseline="central">Tested incremental edge, controlling for RS</text>

<!-- Step 3 -->
<rect x="40" y="304" width="600" height="92" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="60" y="326" dominant-baseline="central" fill="#3C3489">Step 3 — conditional edge test (key insight)</text>
<text class="ts" x="60" y="344" dominant-baseline="central" fill="#534AB7">"Does it add signal beyond what relative strength captures?"</text>

<rect x="64" y="358" width="248" height="24" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="188" y="372" text-anchor="middle" dominant-baseline="central" fill="#791F1F">MA align (−9.3%), 52w high (−3.3%)</text>

<rect x="332" y="358" width="248" height="24" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="ts" x="456" y="372" text-anchor="middle" dominant-baseline="central" fill="#27500A">7 indicators with positive incr. edge</text>

<!-- Connector 3→4 -->
<line x1="340" y1="396" x2="340" y2="432" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="420" dominant-baseline="central">Weights proportional to incremental edge</text>

<!-- Step 4: Final 7 -->
<rect x="40" y="432" width="600" height="104" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="60" y="456" dominant-baseline="central" fill="#085041">Final 7 — weighted scoring engine (max 10 pts)</text>

<rect x="64" y="470" width="120" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="124" y="488" text-anchor="middle" dominant-baseline="central" fill="#085041">Rel. strength</text>
<text class="ts" x="124" y="506" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">3.0 pts</text>

<rect x="196" y="470" width="90" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="241" y="488" text-anchor="middle" dominant-baseline="central" fill="#085041">Ichimoku</text>
<text class="ts" x="241" y="506" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">2.0 pts</text>

<rect x="298" y="470" width="66" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="331" y="488" text-anchor="middle" dominant-baseline="central" fill="#085041">CMF</text>
<text class="ts" x="331" y="506" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">1.5 pts</text>

<rect x="376" y="470" width="66" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="409" y="488" text-anchor="middle" dominant-baseline="central" fill="#085041">ROC</text>
<text class="ts" x="409" y="506" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">1.5 pts</text>

<rect x="454" y="470" width="96" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="502" y="488" text-anchor="middle" dominant-baseline="central" fill="#085041">Higher lows</text>
<text class="ts" x="502" y="506" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">1.0 pt</text>

<rect x="562" y="470" width="64" height="22" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="594" y="484" text-anchor="middle" dominant-baseline="central" fill="#085041">Dual RS 0.5</text>

<rect x="562" y="498" width="64" height="22" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="594" y="512" text-anchor="middle" dominant-baseline="central" fill="#085041">ATR 0.5</text>

<!-- Bottom result -->
<rect x="120" y="558" width="440" height="42" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="574" text-anchor="middle" dominant-baseline="central">Score ≥ 8 → +18.4% SPY-adjusted alpha at 63 days</text>
<text class="ts" x="340" y="592" text-anchor="middle" dominant-baseline="central">Validated on 3 years of out-of-sample data</text>
</svg>
</body></html>
