<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Subsector Breakout Lifecycle</title>
<style>
body { margin: 40px auto; max-width: 740px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; } }
</style></head><body>
<svg width="100%" viewBox="0 0 680 440">
<style>
  .th { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; font-weight: 500; fill: #1e293b; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; font-weight: 400; fill: #64748b; }
  .arr { stroke: #94a3b8; stroke-width: 1.5; }
  .leader { stroke: #94a3b8; stroke-width: 0.5; stroke-dasharray: 3 3; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e2e8f0; } .ts { fill: #94a3b8; } .arr { stroke: #64748b; } .leader { stroke: #64748b; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle" style="font-size:16px">Subsector breakout lifecycle</text>
<text class="ts" x="340" y="48" text-anchor="middle">Each subsector progresses through states based on breadth and momentum</text>

<!-- State boxes (back layer) -->

<rect x="40" y="100" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="100" y="120" text-anchor="middle" dominant-baseline="central">Quiet</text>
<text class="ts" x="100" y="140" text-anchor="middle" dominant-baseline="central">Breadth &lt; 25%</text>

<rect x="200" y="100" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="260" y="120" text-anchor="middle" dominant-baseline="central" fill="#633806">Emerging</text>
<text class="ts" x="260" y="140" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Breadth ≥ 50%</text>

<rect x="360" y="100" width="120" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="420" y="120" text-anchor="middle" dominant-baseline="central" fill="#27500A">Confirmed</text>
<text class="ts" x="420" y="140" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Sustained hot</text>

<rect x="520" y="100" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="580" y="120" text-anchor="middle" dominant-baseline="central" fill="#712B13">Fading</text>
<text class="ts" x="580" y="140" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Losing steam</text>

<!-- Arrows between states -->
<line x1="160" y1="128" x2="198" y2="128" class="arr" marker-end="url(#arrow)"/>
<line x1="320" y1="128" x2="358" y2="128" class="arr" marker-end="url(#arrow)"/>
<line x1="480" y1="128" x2="518" y2="128" class="arr" marker-end="url(#arrow)"/>

<!-- Return to quiet arrow -->
<path d="M580 156 L580 210 L100 210 L100 156" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="228" text-anchor="middle">Breadth &lt; 30% for 5+ readings → returns to quiet</text>

<!-- Revival arrow -->
<path d="M520 146 Q490 200 480 146" fill="none" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Revival label -->
<rect x="446" y="196" width="110" height="44" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="501" y="212" text-anchor="middle" dominant-baseline="central" fill="#27500A">Revival</text>
<text class="ts" x="501" y="230" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">+27.3% alpha</text>
<line class="leader" x1="501" y1="196" x2="498" y2="176"/>

<!-- Transition labels LAST (top layer, above boxes) -->
<text class="ts" x="339" y="82" text-anchor="middle">3+ readings</text>
<text class="ts" x="499" y="82" text-anchor="middle">Cools off</text>

<!-- Bottom: Backtested results -->
<rect x="60" y="270" width="560" height="150" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central">Backtested forward returns (63-day, SPY-adjusted)</text>

<rect x="84" y="316" width="156" height="48" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="162" y="334" text-anchor="middle" dominant-baseline="central" fill="#633806">Emerging</text>
<text class="ts" x="162" y="352" text-anchor="middle" dominant-baseline="central" fill="#854F0B">+13.1% (no edge)</text>

<rect x="260" y="316" width="156" height="48" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="338" y="334" text-anchor="middle" dominant-baseline="central" fill="#27500A">Confirmed</text>
<text class="ts" x="338" y="352" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">+21.7% (+6.9% edge)</text>

<rect x="436" y="316" width="156" height="48" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="514" y="334" text-anchor="middle" dominant-baseline="central" fill="#27500A">Revival</text>
<text class="ts" x="514" y="352" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">+27.3% (+12.5% edge)</text>

<text class="ts" x="340" y="394" text-anchor="middle" dominant-baseline="central">Emerging signals are noise. Wait for Confirmed or Revival.</text>
</svg>
</body></html>
